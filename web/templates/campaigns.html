{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2><i class="fas fa-play"></i> Run APT Campaign</h2>
        <p class="text-muted">Select an APT group and configure assessment parameters</p>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-cog"></i> Campaign Configuration
            </div>
            <div class="card-body">
                <form id="campaignForm">
                    <div class="mb-3">
                        <label class="form-label">APT Group</label>
                        <select class="form-select" id="aptGroup" required>
                            <option value="apt29">APT29 (Cozy Bear) - Russian State</option>
                            <option value="lazarus">Lazarus Group - North Korea</option>
                            <option value="ransomware">Ransomware Operator</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Detection Maturity (0-1)</label>
                        <input type="range" class="form-range" id="detectionMaturity" min="0" max="1" step="0.1" value="0.5">
                        <div class="mt-2">
                            <span class="badge bg-secondary">Basic</span>
                            <span class="badge bg-warning">Moderate</span>
                            <span class="badge bg-success">Advanced</span>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="safeMode" checked>
                        <label class="form-check-label">Safe Mode (No actual commands executed)</label>
                    </div>
                    
                    <button type="submit" class="btn btn-danger" id="runBtn">
                        <i class="fas fa-play"></i> Run Campaign
                    </button>
                </form>
            </div>
        </div>
        
        <div class="card mt-4" id="progressCard" style="display: none;">
            <div class="card-header">
                <i class="fas fa-spinner fa-spin"></i> Campaign Progress
            </div>
            <div class="card-body">
                <div class="progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">
                        Running...
                    </div>
                </div>
                <p class="mt-3" id="progressMessage">Campaign started. This may take a few moments...</p>
                <div id="campaignResults" style="display: none;"></div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
$(document).ready(function() {
    $('#campaignForm').on('submit', function(e) {
        e.preventDefault();
        
        const data = {
            apt_group: $('#aptGroup').val(),
            detection_maturity: parseFloat($('#detectionMaturity').val()),
            safe_mode: $('#safeMode').is(':checked')
        };
        
        $('#runBtn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Starting...');
        $('#progressCard').show();
        
        $.ajax({
            url: '/api/campaigns/run',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(response) {
                $('#progressMessage').html('Campaign started! ID: ' + response.campaign_id);
                checkStatus(response.campaign_id);
            },
            error: function(xhr) {
                $('#progressMessage').html('Error: ' + xhr.responseJSON.error);
                $('#runBtn').prop('disabled', false).html('<i class="fas fa-play"></i> Run Campaign');
            }
        });
    });
    
    function checkStatus(campaignId) {
        setTimeout(function() {
            $.ajax({
                url: '/api/campaigns/status/' + campaignId,
                method: 'GET',
                success: function(data) {
                    if (data.status === 'completed') {
                        $('#progressMessage').html('Campaign completed successfully!');
                        $('#campaignResults').html(`
                            <div class="alert alert-success">
                                <h5>Results</h5>
                                <p>Success Rate: ${(data.success_rate * 100).toFixed(1)}%</p>
                                <p>Detection Rate: ${(data.detection_rate * 100).toFixed(1)}%</p>
                                <p>Impact Score: ${data.impact_score.toFixed(1)}/10</p>
                                <a href="/results" class="btn btn-primary">View Full Results</a>
                            </div>
                        `).show();
                        $('#runBtn').prop('disabled', false).html('<i class="fas fa-play"></i> Run Campaign');
                    } else if (data.status === 'failed') {
                        $('#progressMessage').html('Campaign failed: ' + data.error);
                        $('#runBtn').prop('disabled', false).html('<i class="fas fa-play"></i> Run Campaign');
                    } else {
                        $('#progressMessage').html('Campaign running... ' + new Date().toLocaleTimeString());
                        checkStatus(campaignId);
                    }
                }
            });
        }, 2000);
    }
});
</script>
{% endblock %}
